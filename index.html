<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Estagiários - CMC</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo-camara { max-height: 80px; object-fit: contain; }
        .input-text { text-align: center; font-size: 0.85rem; transition: all 0.2s; }
        .input-text:disabled { background-color: #e9ecef; border-color: transparent; }
        .col-check { min-width: 40px; }
        .col-mat { min-width: 90px; }
        .col-presenca { min-width: 120px; }
        .col-periodo { min-width: 120px; }
        .col-controle { min-width: 130px; }
        .form-check-input { cursor: pointer; transform: scale(1.2); }
        .is-invalid-row { background-color: #fff3f3 !important; border: 1px solid #dc3545 !important; }
    </style>
</head>
<body>

<div class="container-fluid mt-4 mb-5 px-4">
    <div class="card p-4 p-md-5">
        
        <div class="text-center border-bottom mb-4 pb-4">
            <img id="imgLogo" src="logo_cmc.png" alt="Logo CMC" class="logo-camara mb-3" onerror="this.style.display='none';">
            <h2 class="text-primary fw-bold mb-2">Formulário de Frequência</h2>
            <div class="mb-4">
                <span class="badge bg-primary px-4 py-2 fs-5 rounded-pill shadow-sm">Estagiários</span>
            </div>
            <div id="statusConexao" class="badge bg-secondary p-2">Aguardando inicialização...</div>
        </div>

        <div class="row mb-4 bg-light p-3 border rounded mx-0">
            <div class="col-md-4">
                <label class="form-label fw-bold">1. Selecione a Lotação:</label>
                <input class="form-control border-primary" list="listaLotacoesDatalist" id="selectLotacao" placeholder="Pesquise a lotação..." disabled>
                <datalist id="listaLotacoesDatalist"></datalist>
            </div>
            <div class="col-md-5 mt-3 mt-md-0">
                <label class="form-label fw-bold">2. Responsável:</label>
                <input class="form-control border-primary" list="listaResponsaveisDatalist" id="selectResponsavel" placeholder="Selecione a lotação primeiro..." disabled>
                <datalist id="listaResponsaveisDatalist"></datalist>
            </div>
            <div class="col-md-3 mt-3 mt-md-0">
                <label class="form-label fw-bold">3. Mês/Ano:</label>
                <input type="month" id="inputMesAno" class="form-control border-primary">
            </div>
        </div>

        <div class="row mb-4 mx-0">
            <div class="col-md-12 p-3 bg-white border rounded">
                <label class="form-label fw-bold">E-mail institucional do Responsável:</label>
                <input type="email" id="inputEmail" class="form-control border-primary" placeholder="exemplo@cmc.pr.gov.br">
            </div>
        </div>

        <div id="areaTabela" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3 bg-white p-3 border rounded">
                <h5 class="mb-0 text-secondary">Lotação: <span id="spanLotacao" class="text-primary fw-bold"></span></h5>
            </div>
            
            <div class="table-responsive border rounded shadow-sm">
                <table class="table table-hover align-middle bg-white mb-0 text-center">
                    <thead class="table-light">
                        <tr>
                            <th class="col-check align-middle"><input class="form-check-input border-secondary" type="checkbox" id="checkAll" checked onclick="toggleAllChecks(this)"></th>
                            <th class="text-start col-mat">Matrícula</th>
                            <th class="text-start">Nome do Estagiário</th>
                            <th class="col-periodo">Período</th>
                            <th class="col-presenca">Presença</th>
                            <th class="col-controle">Falta</th>
                            <th class="col-controle">Atestados/<br>Afastamentos</th>
                            <th class="col-controle">Recesso</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaBody"></tbody>
                </table>
            </div>

            <div class="mt-4 border-top pt-4 text-center">
                <h6 class="text-muted fw-bold mb-3">FINALIZAÇÃO</h6>
                <button id="btnGerarPDF" class="btn btn-success btn-lg px-5 fw-bold shadow-sm mb-2">📄 Gerar Relatório e Ir para o Envio</button>
                <div class="text-start mt-4">
                    <button id="btnLimpar" class="btn btn-outline-secondary btn-sm fw-bold">🔄 Limpar Tela</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnZTxK2HHvmg9JNSwx8asM__Wh_uiT2jaiZO625oe06gdf-VMiaLVDkjqggf8pbmtriOZFkrKIMDb1/pub?gid=0&single=true&output=csv";
    
    // LINK DO APPSCRIPT ATUALIZADO AQUI
    const URL_APPSCRIPT_SALVAR = "https://script.google.com/macros/s/AKfycbxSmfw0IlBVVMqiaDR5ijR5ioKY4dyHDOvDAOUT0_oBtaWlYGvvDUTBU5ZyiUUYh5NYeQ/exec";
    
    const LINK_FORMS_ENVIO = "https://docs.google.com/forms/d/e/1FAIpQLScGy83OEf2D1ipQMSFKWNIKeXtMbSXQ-S5AqMEgBFcUVbDRbA/viewform";

    let baseGeral = [];
    let cacheDadosOriginais = {}; 

    window.addEventListener('DOMContentLoaded', () => {
        const data = new Date();
        let mes = data.getMonth(); 
        let ano = data.getFullYear();
        if (mes === 0) { mes = 12; ano = ano - 1; }
        document.getElementById("inputMesAno").value = `${ano}-${String(mes).padStart(2, '0')}`;
        tentaConectarPlanilha();
    });

    function buscarValorInteligente(obj, termosBusca) {
        const chaves = Object.keys(obj);
        for (let chave of chaves) {
            const chaveLimpa = chave.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            for (let termo of termosBusca) {
                if (chaveLimpa === termo || chaveLimpa.includes(termo)) return obj[chave] || "";
            }
        }
        return "";
    }

    function tentaConectarPlanilha() {
        Papa.parse(LINK_CSV + "&t=" + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                if (results.data) {
                    baseGeral = results.data;
                    popularLotacoes();
                    document.getElementById("statusConexao").className = "badge bg-success p-2";
                    document.getElementById("statusConexao").innerHTML = "✓ Base carregada";
                }
            }
        });
    }

    function popularLotacoes() {
        const lotacoes = [...new Set(baseGeral.map(item => buscarValorInteligente(item, ["lotacao"])))].filter(Boolean).sort();
        const datalist = document.getElementById("listaLotacoesDatalist");
        datalist.innerHTML = lotacoes.map(l => `<option value="${l}">`).join('');
        document.getElementById("selectLotacao").disabled = false;
    }

    document.getElementById("selectLotacao").addEventListener("change", (e) => {
        const lotSelected = e.target.value;
        const respInput = document.getElementById("selectResponsavel");
        const respDatalist = document.getElementById("listaResponsaveisDatalist");
        respDatalist.innerHTML = ""; respInput.value = "";
        document.getElementById("areaTabela").classList.add("d-none");
        if (!lotSelected) return;
        const estagiariosLotacao = baseGeral.filter(s => buscarValorInteligente(s, ["lotacao"]) === lotSelected);
        const responsaveis = [...new Set(estagiariosLotacao.map(s => buscarValorInteligente(s, ["responsavel"])))].filter(Boolean);
        respDatalist.innerHTML = responsaveis.map(r => `<option value="${r}">`).join('');
        respInput.disabled = false;
        if (responsaveis.length === 1) respInput.value = responsaveis[0];
        montarTabela(estagiariosLotacao, lotSelected);
    });

    function montarTabela(servidores, lotacao) {
        const tbody = document.getElementById("tabelaBody");
        tbody.innerHTML = "";
        document.getElementById("spanLotacao").textContent = lotacao;
        
        servidores.forEach((servidor, i) => {
            const mat = buscarValorInteligente(servidor, ["matricula"]);
            const nome = buscarValorInteligente(servidor, ["nome do estagiario", "nome"]);
            const per = buscarValorInteligente(servidor, ["periodo"]);
            const fal = buscarValorInteligente(servidor, ["falta"]);
            const ate = buscarValorInteligente(servidor, ["atestados", "afastamentos"]);
            const rec = buscarValorInteligente(servidor, ["recesso"]);
            
            cacheDadosOriginais[mat] = { fal, ate, rec };
            const parcial = (rec.trim() !== "" || fal.trim() !== "" || ate.trim() !== "");
            
            tbody.innerHTML += `
                <tr id="linha-${i}">
                    <td><input class="form-check-input border-secondary check-servidor" type="checkbox" id="check-${i}" checked></td>
                    <td class="text-secondary fw-bold text-start mat-valor">${mat}</td>
                    <td class="text-dark text-start">${nome}</td>
                    <td><input type="text" class="form-control form-control-sm input-text" id="periodo-${i}" value="${per}"></td>
                    <td><select class="form-select form-select-sm" id="presenca-${i}" onchange="toggleCamposJustificativa(${i})">
                        <option value="integral" ${!parcial ? "selected" : ""}>Integral</option>
                        <option value="parcial" ${parcial ? "selected" : ""}>Parcial</option>
                    </select></td>
                    <td><input type="text" class="form-control form-control-sm input-text" id="faltas-${i}" value="${fal}" ${parcial ? '' : 'disabled'}></td>
                    <td><input type="text" class="form-control form-control-sm input-text" id="atestados-${i}" value="${ate}" ${parcial ? '' : 'disabled'}></td>
                    <td><input type="text" class="form-control form-control-sm input-text" id="recesso-${i}" value="${rec}" ${parcial ? '' : 'disabled'}></td>
                </tr>`;
        });
        document.getElementById("areaTabela").classList.remove("d-none");
    }

    window.toggleCamposJustificativa = function(i) {
        const mat = document.querySelector(`#linha-${i} .mat-valor`).innerText;
        const select = document.getElementById(`presenca-${i}`);
        const f = document.getElementById(`faltas-${i}`);
        const a = document.getElementById(`atestados-${i}`);
        const r = document.getElementById(`recesso-${i}`);

        if (select.value === "integral") {
            f.disabled = a.disabled = r.disabled = true;
            f.value = a.value = r.value = "";
        } else {
            f.disabled = a.disabled = r.disabled = false;
            if(cacheDadosOriginais[mat]){
                f.value = cacheDadosOriginais[mat].fal;
                a.value = cacheDadosOriginais[mat].ate;
                r.value = cacheDadosOriginais[mat].rec;
            }
        }
    }

    window.toggleAllChecks = (s) => document.querySelectorAll('.check-servidor').forEach(c => c.checked = s.checked);
    document.getElementById("btnLimpar").addEventListener("click", () => location.reload());

    document.getElementById("btnGerarPDF").addEventListener("click", () => {
        const mesAno = document.getElementById("inputMesAno").value;
        const responsavel = document.getElementById("selectResponsavel").value;
        const email = document.getElementById("inputEmail").value.trim();
        const lotacao = document.getElementById("spanLotacao").textContent;
        const dataAgora = new Date();
        const dataReg = dataAgora.toLocaleDateString('pt-BR');

        if(!email.toLowerCase().endsWith("@cmc.pr.gov.br")) return alert("insira o e-mail institucional de domínio @cmc.pr.gov.br.");
        if(!mesAno || !responsavel) return alert("Preencha todos os campos corretamente!");

        const registrosExportar = [];
        const dadosPDF = [];
        let erroJustificativa = false;

        document.querySelectorAll("#tabelaBody tr").forEach((tr, i) => {
            if (document.getElementById(`check-${i}`).checked) {
                const mat = tr.querySelector('.mat-valor').innerText;
                const nome = tr.cells[2].innerText;
                const periodo = document.getElementById(`periodo-${i}`).value;
                const presenca = document.getElementById(`presenca-${i}`).value.toUpperCase();
                const faltas = document.getElementById(`faltas-${i}`).value.trim();
                const atestados = document.getElementById(`atestados-${i}`).value.trim();
                const recesso = document.getElementById(`recesso-${i}`).value.trim();

                if (presenca === "PARCIAL" && faltas === "" && atestados === "" && recesso === "") {
                    erroJustificativa = true; document.getElementById(`linha-${i}`).classList.add("is-invalid-row");
                } else {
                    document.getElementById(`linha-${i}`).classList.remove("is-invalid-row");
                }

                registrosExportar.push([
                    dataReg, mesAno, responsavel, mat, nome, lotacao, periodo, presenca, faltas || "-", atestados || "-", recesso || "-"
                ]);

                dadosPDF.push([mat, nome, lotacao, periodo, presenca, faltas || "-", atestados || "-", recesso || "-"]);
            }
        });

        if (erroJustificativa) return alert("⚠️ Preencha a justificativa para presença PARCIAL.");
        if (registrosExportar.length === 0) return alert("⚠️ Selecione ao menos um estagiário.");

        const btn = document.getElementById("btnGerarPDF");
        const textoOriginal = btn.innerHTML; btn.innerHTML = "⏳ Processando..."; btn.disabled = true;

        // Requisição para o Sheets contendo exatamente a montagem que configuramos
        fetch(URL_APPSCRIPT_SALVAR, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ registros: registrosExportar }) 
        });

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const [ano, mesNum] = mesAno.split('-');
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        const nomeMes = meses[parseInt(mesNum) - 1].toLowerCase();

        try {
            const img = document.getElementById("imgLogo");
            if (img.complete && img.naturalHeight !== 0) doc.addImage(img, 'PNG', 14, 12, 35, 15);
        } catch(e) {}
        doc.setLineWidth(0.5); doc.setDrawColor(180, 180, 180); doc.line(54, 12, 54, 27);
        doc.setTextColor(0,0,0); doc.setFontSize(11); doc.setFont("helvetica", "bold");
        doc.text("FORMULÁRIO DE FREQUÊNCIA DE ESTAGIÁRIOS", 59, 18);
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text("À Diretoria de Gestão de Pessoas (DGEP),", 14, 43);
        doc.text(`Informamos o controle de frequência dos estagiários vinculados a este gabinete/lotação, referente ao mês de ${nomeMes} de ${ano}.`, 14, 50, { maxWidth: 182 });
        doc.setFont("helvetica", "bold"); doc.text(`Responsável: ${responsavel}`, 14, 67);

        doc.autoTable({
            startY: 74, theme: 'grid', headStyles: { fillColor: [230, 230, 230], textColor: [0,0,0], fontStyle: 'bold', halign: 'center' },
            head: [['Matrícula', 'Nome', 'Lotação', 'Período', 'Presença', 'Falta', 'Atest./Afast.', 'Recesso']], body: dadosPDF,
            styles: { fontSize: 7, halign: 'center' }, margin: { bottom: 25 },
            didDrawPage: function() {
                doc.setFontSize(7); doc.setFont("helvetica", "normal");
                doc.text("Os Gabinetes Parlamentares devem enviar à Diretoria de Gestão de Pessoas (DGEP) da CMC o formulário de frequência dos estagiários relativo ao mês anterior.", 14, 282, { maxWidth: 182 });
            }
        });

        let finalY = doc.lastAutoTable.finalY + 15;
        if (finalY + 50 > 275) { doc.addPage(); finalY = 30; }
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text(`Data: ${dataReg}`, 14, finalY);
        doc.text("____________________________________________________", 105, finalY + 20, { align: 'center' });
        doc.text("Assinatura do Responsável", 105, finalY + 25, { align: 'center' });
        doc.setFont("helvetica", "bold"); doc.text(responsavel, 105, finalY + 30, { align: 'center' });
        doc.setFontSize(8); doc.setTextColor(100, 100, 100);
        doc.text(`Documento gerado por: ${email}`, 105, finalY + 36, { align: 'center' });
        doc.text(`Data e Hora da geração: ${dataReg} às ${dataAgora.toLocaleTimeString('pt-BR')}`, 105, finalY + 40, { align: 'center' });

        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i); doc.setFontSize(8); doc.setTextColor(100, 100, 100);
            doc.text(`Página ${i} de ${totalPages}`, 196, 16, { align: 'right' });
        }

        doc.save(`Frequencia_Estagiarios_${lotacao.replace(/\s+/g, '_')}_${mesNum}_${ano}.pdf`);
        
        setTimeout(() => {
            const novaAba = window.open(LINK_FORMS_ENVIO, "_blank");
            if(novaAba) {
                novaAba.focus();
            } else {
                alert("⚠️ O seu navegador bloqueou a abertura da aba de envio! Por favor, clique no ícone de 'Pop-up Bloqueado' na barra de endereços (lá no topo) e permita pop-ups deste site.");
            }
            btn.innerHTML = "📄 Gerar Relatório e Ir para o Envio"; btn.disabled = false;
            if(novaAba) alert("✅ Dados enviados com sucesso! Relatório PDF baixado. Anexe o arquivo na aba que acabou de se abrir.");
        }, 1200);
    });
</script>
</body>
</html>
